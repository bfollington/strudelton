<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strudel → MIDI</title>
    <style>
      :root {
        --bg: #2b2b2b;
        --panel: #3c3c3c;
        --accent: #ffa500;
        --text: #e8e8e8;
        --border: #1f1f1f;
        --input: #1f1f1f;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--panel);
        color: var(--text);
        font: 13px/1.4 -apple-system, system-ui, sans-serif;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 8px 12px;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      header .dot { color: var(--accent); }
      #editor { flex: 1; overflow: hidden; min-height: 80px; }
      .cm-editor { height: 100%; }
      #preview {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        border-top: 1px solid var(--border);
        background: var(--bg);
      }
      #roll { width: 100%; height: 72px; display: block; }
      #status { padding: 3px 12px 5px; font: 11px ui-monospace, monospace; }
      #status.ok { color: var(--text); opacity: 0.6; }
      #status.warn { color: #e8c06a; opacity: 0.9; }
      #status.err { color: #ff6b6b; opacity: 1; }
      footer {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-top: 1px solid var(--border);
      }
      footer label { display: flex; align-items: center; gap: 6px; }
      input[type="number"] {
        width: 56px;
        background: var(--input);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 6px;
        font: 13px ui-monospace, monospace;
      }
      .hint { opacity: 0.55; font-size: 11px; }
      .spacer { flex: 1; }
      button {
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 4px;
        padding: 7px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { transform: translateY(1px); }
      button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    </style>
  </head>
  <body>
    <header><span class="dot">🌀</span> Strudel → MIDI</header>
    <div id="editor"></div>
    <div id="preview">
      <canvas id="roll"></canvas>
      <div id="status" class="ok"></div>
    </div>
    <footer>
      <label>Bars <input id="bars" type="number" min="1" max="64" step="1" /></label>
      <span class="hint">cycles baked into the clip · ⌘↵ to bake</span>
      <span class="spacer"></span>
      <button id="cancel" class="secondary">Cancel</button>
      <button id="bake">Bake</button>
    </footer>
    <!-- The extension replaces the token below with { code, bars } before opening. -->
    <script>
      window.__strudeltonInitial = __STRUDELTON_INITIAL_JSON__;
    </script>
    <!-- build.ts inlines the bundled CodeMirror editor here. -->
    <script>
      /*__EDITOR_BUNDLE__*/
    </script>
  </body>
</html>
