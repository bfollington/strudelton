<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strudel → MIDI</title>
    <style>
      :root {
        --bg: #2b2b2b;
        --panel: #3c3c3c;
        --accent: #ffa500;
        --text: #e8e8e8;
        --border: #1f1f1f;
        --input: #1f1f1f;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--panel);
        color: var(--text);
        font: 13px/1.4 -apple-system, system-ui, sans-serif;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 8px 12px;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      header .dot { color: var(--accent); }
      #code {
        flex: 1;
        width: 100%;
        resize: none;
        border: none;
        outline: none;
        padding: 12px;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.5 ui-monospace, Menlo, monospace;
        tab-size: 2;
      }
      footer {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-top: 1px solid var(--border);
      }
      footer label { display: flex; align-items: center; gap: 6px; }
      input[type="number"] {
        width: 56px;
        background: var(--input);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 6px;
        font: 13px ui-monospace, monospace;
      }
      .hint { opacity: 0.55; font-size: 11px; }
      .spacer { flex: 1; }
      button {
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 4px;
        padding: 7px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { transform: translateY(1px); }
      button.secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <header><span class="dot">🌀</span> Strudel → MIDI</header>
    <textarea id="code" spellcheck="false" autocomplete="off"></textarea>
    <footer>
      <label>Bars <input id="bars" type="number" min="1" max="64" step="1" /></label>
      <span class="hint">cycles of the pattern baked into the clip</span>
      <span class="spacer"></span>
      <button id="cancel" class="secondary">Cancel</button>
      <button id="bake">Bake ⌘↵</button>
    </footer>
    <script>
      // The token below is replaced by the extension with { code, bars } before opening.
      const INITIAL = __STRUDELTON_INITIAL__;
      const $ = (id) => document.getElementById(id);

      function send(message) {
        if (window.webkit?.messageHandlers?.live) {
          window.webkit.messageHandlers.live.postMessage(message);
        } else if (window.chrome?.webview) {
          window.chrome.webview.postMessage(message);
        }
      }
      // close_and_send is the ONLY way the webview can close the dialog; for Cancel we send a
      // sentinel the extension treats as a no-op.
      function bake() {
        const code = $("code").value;
        const bars = Math.max(1, Math.min(64, parseInt($("bars").value, 10) || 1));
        send({ method: "close_and_send", params: [JSON.stringify({ code, bars })] });
      }
      function cancel() {
        send({ method: "close_and_send", params: [JSON.stringify({ cancel: true })] });
      }

      $("code").value = INITIAL.code || "";
      $("bars").value = INITIAL.bars || 4;
      $("bake").addEventListener("click", bake);
      $("cancel").addEventListener("click", cancel);
      document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") bake();
        else if (e.key === "Escape") cancel();
      });
      $("code").focus();
    </script>
  </body>
</html>
